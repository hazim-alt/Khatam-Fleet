name: Build Khatam APKs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-driver:
    name: Build Fleet Driver APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          mkdir -p build-driver
          keytool -genkey -v -keystore build-driver/android.keystore \
            -alias khatam -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Khatam Fleet, OU=IT, O=Khatam, L=KL, S=KL, C=MY" \
            -storepass khatam123 -keypass khatam123

      - name: Print keystore fingerprint
        run: |
          keytool -list -v -keystore build-driver/android.keystore \
            -alias khatam -storepass khatam123 | grep SHA256

      - name: Setup Driver App Icon
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p build-driver/app/src/main/res/mipmap-mdpi
          mkdir -p build-driver/app/src/main/res/mipmap-hdpi
          mkdir -p build-driver/app/src/main/res/mipmap-xhdpi
          mkdir -p build-driver/app/src/main/res/mipmap-xxhdpi
          mkdir -p build-driver/app/src/main/res/mipmap-xxxhdpi
          convert driver-icon.png -resize 48x48 build-driver/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert driver-icon.png -resize 72x72 build-driver/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert driver-icon.png -resize 96x96 build-driver/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert driver-icon.png -resize 144x144 build-driver/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert driver-icon.png -resize 192x192 build-driver/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Create Android project
        run: |
          cd build-driver
          mkdir -p app/src/main/res/values
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          cat > settings.gradle << 'EOF'
          rootProject.name = "FleetDriver"
          include ':app'
          EOF
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.khatam.fleetdriver'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.khatam.fleetdriver'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
              signingConfigs {
                  release {
                      storeFile file('../android.keystore')
                      storePassword 'khatam123'
                      keyAlias 'khatam'
                      keyPassword 'khatam123'
                  }
              }
              buildTypes {
                  release { signingConfig signingConfigs.release; minifyEnabled false }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-feature android:name="android.hardware.camera" android:required="false"/>
              <application
                  android:label="Fleet Driver"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:exported="true">
                      <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://hazim-alt.github.io/Khatam-Fleet/driver-app.html"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name="com.google.androidbrowserhelper.trusted.DelegationService" android:exported="true">
                      <intent-filter>
                          <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Fleet Driver</string>
          </resources>
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Driver APK
        working-directory: build-driver
        run: gradle assembleRelease

      - name: Upload Driver APK
        uses: actions/upload-artifact@v4
        with:
          name: fleet-driver-apk
          path: build-driver/app/build/outputs/apk/release/app-release.apk

